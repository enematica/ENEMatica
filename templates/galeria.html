{% extends 'base.html' %}
{% load static %}

{% block content %}

<head>
    <link rel="stylesheet" href="{% static 'css/galeria.css' %}">
</head>

<!-- Galeria -->
<div id="imagens">
    {% for foto in object_list %}
        <div>
            <img src="{{ foto.imagem.url }}" alt="{{ foto.contexto }}">
        </div>
    {% endfor %}
</div>

<!-- Popup -->
<div class="popup-img">

    <span class="fechar">&times;</span>

    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>

    <h3></h3>

    <img src="" alt="">

</div>

<script src="{% static 'js/galeriaresumos.js' %}"></script>

{% endblock content %}
