{% extends 'base.html' %}
{% load static %}
{% block content %}
    <style>
        body{
            margin-top: 100px;
        }
        a{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img{
            max-width: 100px;
            height: auto;
        }
    </style>

    {% for q in questao %}
        <a href="{% url 'app:questaomodelada_detail' q.id %}">
            <img src="{{q.capa.url}}" alt="imagem capa">
        </a>
    {% endfor %}

    {% for f in figura %}
        <a href="{% url 'app:figura_detail' f.id %}">
            <img src="{{f.capa.url}}" alt="imagem capa">
        </a>
    {% endfor %}

    {% for j in jogo %}
        <a href="{% url 'app:jogo_detail' j.id %}">
            <img src="{{j.capa.url}}" alt="imagem capa">
        </a>
    {% endfor %}


{% endblock %}
